apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: kmithesh/order-service:2
        ports:
        - containerPort: 5002
        env:
        - name: DB_HOST
          value: postgres
        - name: DB_NAME
          value: appdb
        - name: DB_USER
          value: postgres
        - name: DB_PASSWORD
          value: postgres123
        livenessProbe:
          httpGet:
            path: /health
            port: 5002
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5002
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: prod
spec:
  selector:
    app: order-service
  ports:
  - port: 5002
    targetPort: 5002
  type: ClusterIP
