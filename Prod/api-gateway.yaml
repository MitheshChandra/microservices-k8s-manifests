apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: kmithesh/api-gateway:2
        ports:
        - containerPort: 5000
        env:
        - name: USER_SERVICE_URL
          value: http://user-service:5001
        - name: ORDER_SERVICE_URL
          value: http://order-service:5002
        - name: PAYMENT_SERVICE_URL
          value: http://payment-service:5003
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: prod
spec:
  selector:
    app: api-gateway
  ports:
  - port: 80
    targetPort: 5000
    nodePort: 30080
  type: NodePort
